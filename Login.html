<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://kit.fontawesome.com/4fae0f3553.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="Login.css">
    <script src="Login.js"></script>
</head>

<body>



    <div class="wrapper">
        <form action="">
            <h1>Login</h1>
            <div class="input-box">
                <input type="text" placeholder="Username" required>
                <i class="fa-solid fa-user fa-sm"></i>
            </div>

            <div class="input-box">
                <input type="password" placeholder="Password" required id="myInput">
                <i class="fa-solid fa-lock fa-sm"></i>

            </div>

            <input type="checkbox" onclick="myFunction()">Show Password
            <br>
            <br>
            <br>
            <br>
            <div class="remember-forgot">
                <label><input type="checkbox">Remember me </label>
                <a href="#">Forgot Password?</a>
            </div>
            <button type="submit" class="btn">Login</button>
            <div class="register-link">
                <p> Don't have an account? <a href="Register.html">Register</a>

                </p>
            </div>
        </form>
    </div>
</body>

</html>
